services:
  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=codejam_dev;Username=postgres;Password=codejam2026
      EnableHttpsRedirection: "false"
      TZ: America/New_York

    ports:
      - "8080:80"
    volumes:
      - aspnet_keys:/root/.aspnet/DataProtection-Keys

  runner:
    build: ./runner
    ports:
      - "5001:5001"
    volumes:
      - ./runner:/app
    command: python hello.py

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: codejam_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: codejam2026
      TZ: America/New_York
      PGTZ: America/New_York
      
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/codejam_dev.sql:/docker-entrypoint-initdb.d/codejam_dev.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codejam_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  aspnet_keys:
