<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team Facing Page</title>
     <style>
        html, body {
          margin: 5px 0;
          padding: 0;
          width: 100%;
          height: 80%;
          background-color: black;
          color: white;
          font-family: 'Verdana', system-ui, sans-serif;
        }
        h1, h2, h3, p
        {
            text-align: center;
        }
        #editor
        {
          margin-left: 20px;
          padding: 0;
          width: 75%;
          height: 80%;
        }
        .error-output {
            color: red;
        }
        .bottom-sec
        {
            display: flex;
            margin: 5px;
        }
        .output-panel
        {
            border: 1px solid black;
            padding: 20px;
            width: 50%;
            display: flex;
            margin-right: 10px;
        }
        #terminal
        {
            height: 200px;
            width: 75%;
            margin-left: 20px;

        }
        pre
        {
            font-family: Verdana;
            font-size: 16px;
        }
        .input-text
        {
            background-color: #5c5c5c;
            color: white;
            border: 5px solid wheat;
        }
        .input-text:focus
        {
            border-color: red;
        }
        .input-text-label
        {
            color: red;
        }
         #compile
         {
            margin-left: 20px;
            font-size: 16px;
            padding: 10px 20px;
            margin-top: 5px;
            margin-bottom: 5px;
            font-weight: 700;
            border-radius: 5px;
            border: 2px solid green;
            color: green;
            background-color: #1E1E1E;
         }
         #compile:hover
         {
            color: white;
            background-color: green;
            cursor: pointer;
         }
         #terminal .xterm-viewport::-webkit-scrollbar {
            width: 8px;
        }

        #terminal .xterm-viewport::-webkit-scrollbar-track {
            background-color: #1e1e1e;
        }

        #terminal .xterm-viewport::-webkit-scrollbar-thumb {
            background-color: #424242;
            min-height: 20px;
        }
    </style>

     <link rel="stylesheet" href="{{ url_for('static', filename='xterm.css') }}">
    <script src="{{ url_for('static', filename='xterm.js') }}"></script>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>


    <!-- RequireJS -->
    <!-- Monaco requires a module loader (AMD) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>

    <script>
        // Monaco loads files in a vs folder, setting the path for Cloudflare to host
        require.config({
          paths: {
            vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs"
          }
        });
    </script>

</head>
<body>
    <h1>Team Facing Page</h1>
    <h2>Team {{ team_number or "A"}}</h2>

    <h3>Make sure to press compile to save code!</h3>

    <div id="editor"></div>

    <button onclick="getSubmissionCode()" id="compile" type="submit">Compile</button>
    <button onclick="onSubmission()" id="submit" type="submit">Submit</button>

    <div id="submitTime" class="submit_time"></div>

    <div class="bottom-sec">
        <div class="output-panel">
            <pre class="output">{{output}}</pre>
            <pre class="error-output">{{error_output}}</pre>
        </div>
    </div>

    <!-- Add our hello.js file (even if it's in a sub-directory -->
    <script src="{{ url_for('static', filename='hello.js') }}"></script>
    <script src="{{ url_for('static', filename='getSubmissionCode.js') }}"></script>
    <script src="{{ url_for('static', filename='onSubmission.js') }}"></script>

<script src="{{ url_for('static', filename='socket-code.js') }}"></script>





</body>
</html>
